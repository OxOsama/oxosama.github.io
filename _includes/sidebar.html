<div class="sticky top-28 flex flex-col gap-6">
    <div class="flex flex-col items-center lg:items-start text-center lg:text-left gap-4">
        <div class="relative group cursor-pointer">
            <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-card-dark shadow-xl ring-2 ring-primary/20 transition-transform group-hover:scale-105">
                <img alt="{{ site.author.name }} Avatar" class="w-full h-full object-cover" src="{{ site.author.avatar | relative_url }}"/>
            </div>
            <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 rounded-full border-2 border-background-dark" title="Online / CTF Active"></div>
        </div>
        <div class="flex flex-col gap-1">
            <h3 class="text-2xl font-bold leading-tight">{{ site.author.name }}</h3>
            <p class="text-primary font-medium text-sm">{{ site.author.bio }}</p>
            <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed mt-2">
                {{ site.description }}
            </p>
        </div>
        <!-- Social Stack -->
        <div class="flex flex-col w-full gap-3 mt-2">
            <a class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-colors group" href="https://github.com/{{ site.author.github }}">
                <span class="material-symbols-outlined text-gray-400 group-hover:text-white">code</span>
                <span class="text-sm text-gray-400 group-hover:text-white font-medium">GitHub</span>
            </a>
            <a class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-colors group" href="https://twitter.com/{{ site.author.twitter }}">
                <span class="material-symbols-outlined text-gray-400 group-hover:text-primary">alternate_email</span>
                <span class="text-sm text-gray-400 group-hover:text-primary font-medium">Twitter / X</span>
            </a>
            <!-- Add more social links as needed -->
        </div>
    </div>
</div>
