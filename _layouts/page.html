---
layout: default
---
<!-- Main Layout Grid -->
<div class="flex-1 w-full max-w-[1440px] mx-auto p-6 md:p-8 lg:p-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 relative">
        <!-- Left Sidebar: Author Profile -->
        <aside class="lg:col-span-3 xl:col-span-2 hidden lg:block">
            {% include sidebar.html %}
        </aside>

        <!-- Center Column: Page Content -->
        <main class="lg:col-span-6 xl:col-span-8 flex flex-col gap-8 min-w-0">
            <!-- Page Header -->
            <div class="flex flex-col gap-6 pb-6 border-b border-border-dark">
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-black leading-tight tracking-tight text-gray-900 dark:text-white">
                    {{ page.title }}
                </h1>
            </div>

            <!-- Markdown Content Area -->
            <article class="prose prose-invert prose-lg max-w-none flex flex-col gap-8 text-gray-300">
                {{ content }}
            </article>

            <!-- Footer within main for mobile spacing -->
            <div class="border-t border-border-dark pt-8 mt-8 flex justify-between items-center text-gray-500 text-sm">
                <p>© {{ site.time | date: '%Y' }} {{ site.author.name }}. All rights reserved.</p>
            </div>
        </main>
        
         <!-- Right Sidebar: TOC (Optional for pages, can explain) -->
        <aside class="lg:col-span-3 xl:col-span-2 hidden lg:block">
             {% if page.toc %}
            {% include toc.html %}
            {% endif %}
        </aside>
    </div>
</div>
