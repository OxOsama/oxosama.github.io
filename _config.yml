    output: true
    permalink: /malware-analysis/:path/
  re-labs:
    output: true
    permalink: /re-labs/:path/
  writeups:
    output: true
    permalink: /writeups/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "malware-analysis"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "re-labs"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "post"
