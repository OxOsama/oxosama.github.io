title: 0xOsama
email: your-email@example.com
description: "Malware Analyst & Blue Teamer"
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
author:
  name: "Mahmoud Osama"
  avatar: "/assets/images/profile.jpg"
  bio: "Malware Analyst & Blue Teamer"
  twitter: 0xOsama
  github: 0xOsama

markdown: kramdown
# theme: minima
plugins:
